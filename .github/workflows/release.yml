name: "Publish Release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-electron:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            os_name: "macos"
            args: "--mac dmg --universal"
          - platform: "ubuntu-22.04"
            os_name: "linux"
            args: "--linux AppImage deb rpm --x64"
          - platform: "windows-latest"
            os_name: "windows"
            args: "--win nsis msi --x64"

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false # 明确版本读取逻辑

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build electron project
        run: |
          pnpm build
          pnpm exec electron-builder ${{ matrix.args }} --publish never

      - name: rename and prepare assets
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            MSI_PATH=$(find release -name "*.msi" -type f | head -n 1)
            EXE_PATH=$(find release -name "*.exe" -type f | head -n 1)
            if [ -n "$MSI_PATH" ]; then cp "$MSI_PATH" artifacts/otomusic-windows-x64-setup.msi; fi
            if [ -n "$EXE_PATH" ]; then cp "$EXE_PATH" artifacts/otomusic-windows-x64-setup.exe; fi
          elif [ "${{ matrix.os_name }}" = "macos" ]; then
            DMG_PATH=$(find release -name "*.dmg" -type f | head -n 1)
            if [ -n "$DMG_PATH" ]; then cp "$DMG_PATH" artifacts/otomusic-macos-universal.dmg; fi
          elif [ "${{ matrix.os_name }}" = "linux" ]; then
            DEB_PATH=$(find release -name "*.deb" -type f | head -n 1)
            RPM_PATH=$(find release -name "*.rpm" -type f | head -n 1)
            APPIMAGE_PATH=$(find release -name "*.AppImage" -type f | head -n 1)
            if [ -n "$DEB_PATH" ]; then cp "$DEB_PATH" artifacts/otomusic-linux-amd64.deb; fi
            if [ -n "$RPM_PATH" ]; then cp "$RPM_PATH" artifacts/otomusic-linux-x86_64.rpm; fi
            if [ -n "$APPIMAGE_PATH" ]; then cp "$APPIMAGE_PATH" artifacts/otomusic-linux-x86_64.AppImage; fi
          fi

      - name: upload release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: "OtoMusic ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
