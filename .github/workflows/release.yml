name: "Publish Release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            os_name: "macos"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            os_name: "linux"
            args: ""
          - platform: "windows-latest"
            os_name: "windows"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: install frontend dependencies
        run: pnpm install

      - name: build tauri project
        run: pnpm tauri build ${{ matrix.args }}

      - name: rename and prepare assets
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            # 找到 MSI 安装包
            cp src-tauri/target/release/bundle/msi/*.msi artifacts/otomusic-windows-x64-setup.msi || true
            # 找到 NSIS 安装版 EXE
            cp src-tauri/target/release/bundle/nsis/*.exe artifacts/otomusic-windows-x64-setup.exe || true
          elif [ "${{ matrix.os_name }}" = "macos" ]; then
            cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/otomusic-macos-universal.dmg || true
          elif [ "${{ matrix.os_name }}" = "linux" ]; then
            cp src-tauri/target/release/bundle/deb/*.deb artifacts/otomusic-linux-amd64.deb || true
            cp src-tauri/target/release/bundle/rpm/*.rpm artifacts/otomusic-linux-x86_64.rpm || true
            cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/otomusic-linux-x86_64.AppImage || true
            tar -czf artifacts/otomusic-linux-x86_64.tar.gz -C src-tauri/target/release OtoMusic
          fi

      - name: upload release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: "OtoMusic ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
